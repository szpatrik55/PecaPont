<div class="cards">
  <div class="card" *ngFor="let stat of stats">
    <h3>{{ stat.label }}</h3>
    <p>{{ stat.value ?? '—' }}</p>
  </div>
</div>

<h3 class="mt">Felhasználói növekedés (7 nap)</h3>

<div class="growth">
  <div class="growth-item" *ngFor="let item of growthData">
    
    <!-- dátum -->
    <span class="date">
      {{ item.date | date:'yyyy.MM.dd' }}
    </span>

    <!-- "grafikon" csík -->
    <div class="bar">
      <div
        class="fill"
        [style.width.%]="item.count * 20"
      ></div>
    </div>

    <!-- darabszám -->
    <span class="count">
      {{ item.count }}
    </span>

  </div>
</div>
