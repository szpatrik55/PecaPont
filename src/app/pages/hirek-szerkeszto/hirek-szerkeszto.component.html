<div class="admin-container">
  <div class="editor-card">
    <header class="editor-header">
      <h1>Hír Létrehozása</h1>
      <p>Töltsd fel a hírt és a kapcsolódó borítóképet a <strong>news</strong> mappába.</p>
    </header>

    <form (ngSubmit)="hirMentese()" #newsForm="ngForm">
      <div class="form-group">
        <label>Hír címe</label>
        <input type="text" [(ngModel)]="article.cim" name="cim" placeholder="Add meg a címet" required />
      </div>

      <div class="form-group">
        <label>Kép feltöltése (Storage: news/)</label>
        <div class="file-drop-zone">
          <input type="file" (change)="onFileSelected($event)" accept="image/*" />
          <p class="file-name" *ngIf="selectedFile">Kiválasztott fájl: {{ selectedFile.name }}</p>
        </div>
      </div>

      <div class="form-group">
        <label>Tartalom</label>
        <textarea [(ngModel)]="article.tartalom" name="tartalom" rows="10" placeholder="Írd ide a hír szövegét..." required></textarea>
      </div>

      <button type="submit" [disabled]="mentesFolyamatban() || !newsForm.valid" class="save-btn">
        {{ mentesFolyamatban() ? 'Mentés folyamatban...' : 'Hír Publikálása' }}
      </button>
    </form>
  </div>
</div>
