<div class="tavak-page">
  <section class="hero-mini">
    <h1>Fedezd fel Magyarország legjobb horgásztavait</h1>
  </section>

  <div class="toolbar">
    <input
      type="text"
      placeholder="Keresés név vagy település szerint..."
      [ngModel]="keresoSzoveg()"
      (ngModelChange)="keresoSzoveg.set($event)"
    />

    <select
      [ngModel]="rendezes()"
      (ngModelChange)="rendezes.set($event)"
    >
      <option value="nev">Név szerint</option>
      <option value="telepules">Település szerint</option>
    </select>
  </div>

  <section class="tavak-grid">
    @for (to of rendezettTavak(); track to.id) {
  <div
    class="to-card"
    [routerLink]="['/tavak', to.id]"
    [ngStyle]="{
      'background-image':
        'linear-gradient(rgba(15,23,42,0.25), rgba(15,23,42,0.85)), url(' +
        (to.kepUrl || 'assets/images/fallback-lake.jpg') +
        ')'
    }"
  >

        <div class="card-overlay">
          <span class="lake-badge">Népszerű víz</span>

          <div class="card-content">
            <h3>{{ to.nev }}</h3>
            <p>{{ to.telepules }}</p>

            <button class="view-btn">
              Részletek →
            </button>
          </div>
        </div>
      </div>
    }
  </section>

</div>
