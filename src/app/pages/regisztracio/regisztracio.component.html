<div class="auth-container">

  <h2>Regisztráció</h2>
  <p class="subtitle">Hozd létre új fiókodat</p>

  <input
    type="email"
    placeholder="Email cím"
    [(ngModel)]="email"
  />

  <input
    type="password"
    placeholder="Jelszó"
    [(ngModel)]="password"
  />

  <button (click)="register()">
    Regisztráció
  </button>

  <p class="login-link">
  Van már fiókod?
  <a routerLink="/bejelentkezes">Jelentkezz be</a>
</p>

</div>
