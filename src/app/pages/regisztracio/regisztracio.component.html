<div class="auth-container">

  <h2>Regisztráció</h2>
  <p class="subtitle">Hozd létre új fiókodat</p>

  <form>
    <input
      type="email"
      placeholder="Email cím"
      [(ngModel)]="email"
      name="email"
    />

    <input
      type="password"
      placeholder="Jelszó"
      [(ngModel)]="password"
      name="password"
    />

    <button type="button" (click)="register()">
      Regisztráció
    </button>
  </form>

  <p class="login-link">
    Van már fiókod?
    <a routerLink="/bejelentkezes">Jelentkezz be</a>
  </p>

</div>
