<h2>Kép feltöltése</h2>

<form [formGroup]="form">

<input
type="text"
placeholder="Cím"
formControlName="title"
/>

<input
type="text"
placeholder="Horgászhely"
formControlName="water"
/>

<textarea
placeholder="Leírás"
formControlName="description"
></textarea>

<input
type="file"
(change)="onFileSelected($event)"
/>

<div *ngIf="previewUrl">
<img [src]="previewUrl" width="300">
</div>

<button
type="button"
(click)="upload()"
>
Feltöltés
</button>

</form>
