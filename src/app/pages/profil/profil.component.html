<div class="profile-page" *ngIf="auth.user$ | async as user">

  <div class="profile-wrapper">

    <!-- HEADER CARD -->
    <div class="profile-header-card">
      <div class="avatar">
        {{ (user.displayName || user.email)?.charAt(0) }}
      </div>

      <div class="user-info">
        <h1>{{ user.displayName || 'Felhasználó' }}</h1>
        <p>{{ user.email }}</p>
      </div>
    </div>

    <!-- GRID -->
    <div class="profile-grid">

      <!-- PROFIL -->
      <div class="profile-card">
        <h2>Profil adatok</h2>

        <label>Megjelenített név</label>
        <input #nameInput [value]="user.displayName" placeholder="Új név">

        <button class="primary" (click)="updateName(nameInput.value)">
          Név frissítése
        </button>

        <p class="hint">Ez a név jelenik meg a fogásoknál.</p>
      </div>

      <!-- BIZTONSÁG -->
      <div class="profile-card">
        <h2>Biztonság</h2>

        <label>Új jelszó</label>
        <input #passwordInput type="password" placeholder="••••••••">

        <button class="primary" (click)="changePassword(passwordInput.value)">
          Jelszó módosítása
        </button>

        <button class="danger" (click)="logout()">
          Kijelentkezés
        </button>
      </div>

    </div>

  </div>

</div>
