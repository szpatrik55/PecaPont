<nav class="top-nav">
  <!-- LOGO -->
  <a class="logo" routerLink="/" (click)="closeMenu()">PecaPont</a>

  <!-- HAMBURGER -->
  <button class="menu-toggle" (click)="menuOpen = !menuOpen">
    ☰
  </button>

  <!-- NAV LINKS -->
  <div class="nav-links" [class.open]="menuOpen">
    <a routerLink="/" (click)="closeMenu()" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Főoldal</a>
    <a routerLink="/tavak" (click)="closeMenu()" routerLinkActive="active">Tavak</a>
    <a routerLink="/hirek" (click)="closeMenu()" routerLinkActive="active">Hírek</a>
    <a routerLink="/versenyek" (click)="closeMenu()" routerLinkActive="active">Versenyek</a>
    <a routerLink="/galeria" (click)="closeMenu()" routerLinkActive="active">Fogások</a>
    <a routerLink="/rolunk" (click)="closeMenu()" routerLinkActive="active">Rólunk</a>

    @if (user$ | async) {
      <a routerLink="/profil" (click)="closeMenu()" routerLinkActive="active">Profil</a>
      <a routerLink="/kepfeltoltes" (click)="closeMenu()" routerLinkActive="active">Kép feltöltése</a>

      @if (isEditor$ | async) {
        <a routerLink="/hirek-szerkeszto" (click)="closeMenu()" routerLinkActive="active">Hír írás</a>
      }

      @if (isAdmin$ | async) {
        <a routerLink="/hirek-szerkeszto" (click)="closeMenu()" routerLinkActive="active">Hír írás</a>
        <a routerLink="/admin" (click)="closeMenu()" routerLinkActive="active">Admin</a>
      }

      <button class="logout-btn" (click)="logout()">
        Kijelentkezés
      </button>
    } @else {
      <a routerLink="/bejelentkezes" (click)="closeMenu()" routerLinkActive="active">Bejelentkezés</a>
    }
  </div>
</nav>
